services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    # Painel RabbitMQ acessível apenas internamente em produção
    expose:
      - "5672"
      - "15672"

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
      - rabbitmq
    expose:
      - "8080"

  nginx:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  pgdata:
