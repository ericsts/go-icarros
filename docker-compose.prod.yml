services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    expose:
      - "5672"
      - "15672"

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
      - rabbitmq
    ports:
      - "127.0.0.1:8080:8080"   # só localhost — nginx do host faz o proxy

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "127.0.0.1:3000:80"     # só localhost — nginx do host faz o proxy

volumes:
  pgdata:
